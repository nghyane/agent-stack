version: "2"
sql:
  # One block per feature. Queries live inside the feature folder and generate
  # a `data` package there. Schema is shared (all migrations) so sqlc sees the
  # full DB; each block only generates code for its own queries.
  - engine: "postgresql"
    queries: "internal/feature/user/queries.sql"
    schema: "db/migrations"
    gen:
      go:
        package: "data"
        out: "internal/feature/user/data"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
